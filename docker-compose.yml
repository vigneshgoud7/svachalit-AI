version: '3.8'

services:
  # 1. PostgreSQL Database with pgvector extension pre-installed
  db:
    image: ankane/pgvector:v0.5.1
    container_name: multichannel-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgrespassword
      POSTGRES_DB: multichannel_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d multichannel_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  # 2. Redis server for BullMQ background queues
  redis:
    image: redis:7-alpine
    container_name: multichannel-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --save 60 1 --loglevel warning
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # 3. Node.js Backend API Server & BullMQ Worker
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: multichannel-backend
    ports:
      - "4000:4000"
    environment:
      - PORT=4000
      - DATABASE_URL=postgresql://postgres:postgrespassword@db:5432/multichannel_db?schema=public
      - REDIS_URL=redis://redis:6379
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - META_VERIFY_TOKEN=${META_VERIFY_TOKEN:-multichannel_verify_token_123}
      - JWT_SECRET=${JWT_SECRET:-super-secret-production-jwt-key}
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:3000}
      - PUBLIC_API_URL=${PUBLIC_API_URL:-http://localhost:4000}
      - REQUIRE_AUTH=${REQUIRE_AUTH:-false}
      - GOOGLE_SHEETS_WEBHOOK_URL=${GOOGLE_SHEETS_WEBHOOK_URL:-}
      - CALENDAR_WEBHOOK_URL=${CALENDAR_WEBHOOK_URL:-}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: always

  # 4. Next.js Frontend Dashboard (App Router)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:4000}
    container_name: multichannel-frontend
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:4000}
    depends_on:
      - backend
    restart: always

volumes:
  postgres_data:
  redis_data:
